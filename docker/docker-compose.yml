# DQAR client kit — Rung 1/2 standalone stack.
#
# Client delivery path: `docker load < dqar-client-kit-X.Y.Z.tar.gz` then
# `docker compose up` from this directory — no build, no internet access
# needed at runtime (TX_MODE=local is the default).
#
# Sonian dev path: `docker compose build` rebuilds the image locally; the
# `additional_contexts` entry below supplies the dqar-contracts sibling repo
# the same way local development does (`pip install -e ../dqar-contracts`).
# Requires Docker Compose v2.17+ (BuildKit, enabled by default).
services:
  app:
    image: dqar-client-kit:${VERSION:-local}
    build:
      context: ..
      dockerfile: Dockerfile
      additional_contexts:
        contracts: ../../dqar-contracts
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - TX_MODE=${TX_MODE:-local}
    volumes:
      - ../data/export:/app/data/export:ro
      - ../data/reports:/app/data/reports
      - ../data/redacted:/app/data/redacted
      - ../config/engagements:/app/config/engagements:ro
    restart: "no"
