# CDAR client kit — Rung 1/2 standalone stack.
#
# Client delivery path: `docker load < cdar-client-kit-X.Y.Z.tar.gz` then
# `docker compose up` from this directory — no build, no internet access
# needed at runtime (TX_MODE=local is the default).
#
# Sonian dev path: `docker compose build` rebuilds the image locally; no
# extra flags or sibling-repo access needed — cdar-contracts ships as a
# vendored wheel in vendor/ (see Dockerfile header for how to update it).
services:
  app:
    image: cdar-client-kit:${VERSION:-local}
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - TX_MODE=${TX_MODE:-local}
    volumes:
      - ../data/export:/app/data/export:ro
      - ../data/reports:/app/data/reports
      - ../data/redacted:/app/data/redacted
      - ../config/engagements:/app/config/engagements:ro
    restart: "no"
