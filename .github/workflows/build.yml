name: Build & test container image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout cdar-client-kit
        uses: actions/checkout@v6

      # cdar-contracts ships as a vendored wheel in vendor/ (15KB) so CI needs
      # no cross-repo auth, no PAT, no BuildKit named contexts. To update the
      # wheel when cdar-contracts bumps: pip wheel ../cdar-contracts --no-deps -w vendor/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        run: |
          docker buildx build \
            -t cdar-client-kit:ci \
            --load \
            .

      # tests/fixtures/fixture-*/ is gitignored (generated locally from a
      # Synthea-derived seed that isn't committed — needs a live FHIR server).
      # build_compliant_reference.py is the dependency-free regression path:
      # no live FHIR server, no Synthea, hand-coded US Core 6.1.0 resources.
      - name: Build deterministic reference extract
        run: python3 tests/build_compliant_reference.py

      - name: Run Stage 1 against the built image
        run: |
          docker run --rm \
            -v "$PWD/data/compliant-reference":/app/data/export:ro \
            cdar-client-kit:ci \
            python stage1/orchestrate.py --ndjson-dir data/export --skip-1a --output-dir /tmp/out

      - name: Stage 2 redaction regression check
        run: |
          docker run --rm \
            -v "$PWD/data/compliant-reference":/app/data/export:ro \
            cdar-client-kit:ci \
            python stage2/anonymize_extract.py --ndjson-dir data/export --output-dir /tmp/redacted --engagement ci

      - name: Verify .fhir-cache was baked into the image (no runtime download)
        run: |
          docker run --rm cdar-client-kit:ci \
            python -c "import pathlib,sys; p=pathlib.Path('/app/.fhir-cache'); sys.exit(0 if p.is_dir() and any(p.iterdir()) else 1)"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          docker save cdar-client-kit:ci | gzip > "dist/cdar-client-kit-${VERSION}.tar.gz"
          shasum -a 256 "dist/cdar-client-kit-${VERSION}.tar.gz" \
            > "dist/cdar-client-kit-${VERSION}.tar.gz.sha256"
          gh release create "$GITHUB_REF_NAME" \
            --title "cdar-client-kit ${GITHUB_REF_NAME}" \
            --notes "Offline Docker image tarball. See RELEASE.md for quick-start instructions." \
            "dist/cdar-client-kit-${VERSION}.tar.gz" \
            "dist/cdar-client-kit-${VERSION}.tar.gz.sha256"
